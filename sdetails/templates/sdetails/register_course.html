{% extends 'sdetails/base.html' %}

{% block content %}

<h1>Register Course</h1>

<form method="post">
    {% csrf_token %}

    {% for field in form %}
        {{ field.label_tag }}
        {{ field }}
        <br><br>

        {% for error in field.errors %}
            <p>{{ error }}</p>
        {% endfor %}
    {% endfor %}

    <button type="submit">Register</button>
</form>

{% endblock %}
